spring.application.name=leetCodeHelper
server.port=8080

# Groq API
groq.api-key=${GROQ_API_KEY}

# LeetCode Auth
leetcode.session=${LEETCODE_SESSION}
leetcode.csrf-token=${LEETCODE_CSRF_TOKEN}

# 선호 언어 (알고리즘 / SQL 분리)
leetcode.alg-language=${LEETCODE_ALG_LANGUAGE:java}
leetcode.sql-language=${LEETCODE_SQL_LANGUAGE:mysql}

# Git 로컬 레포지토리 절대 경로
leetcode.repo-path=${LEETCODE_REPO_PATH}

# 레포 내 디렉터리 구조
leetcode.leetcode-dir=${LEETCODE_LEETCODE_DIR:leetcode}
leetcode.unsolved-dir=${LEETCODE_UNSOLVED_DIR:UnSolved}
leetcode.solved-dir=${LEETCODE_SOLVED_DIR:Solved}

# Git 설정
leetcode.git-username=${LEETCODE_GIT_USERNAME}
leetcode.git-email=${LEETCODE_GIT_EMAIL}

# 스케줄 설정
leetcode.schedule-cron=${LEETCODE_SCHEDULE_CRON:0 0 9 * * MON-FRI}
leetcode.all-fetch-cron=${LEETCODE_ALL_FETCH_CRON:0 0 6 * * MON}
